name: Build 32-bit and 64-bit APK
on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev \
            build-essential cython3 \
            libpq-dev

      - name: Install Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33 buildozer
          pip install -r requirements.txt 2>/dev/null || true

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $HOME/.android
          echo "y" > /tmp/licenses.txt
          cat /tmp/licenses.txt | head -c 1000 > $HOME/.android/repositories.cfg || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses < /tmp/licenses.txt || true
          $ANDROID_SDK_ROOT/tools/bin/sdkmanager --licenses < /tmp/licenses.txt || true

      - name: Build 32-bit APK
        run: |
          echo "=== Starting 32-bit build ==="
          buildozer -v android debug --spec buildozer_32.spec || { 
            echo "=== Build failed, showing logs ==="; 
            tail -n 200 .buildozer/android/platform/build-*/build/outputs/apk/debug/*.log 2>/dev/null || true;
            exit 1; 
          }
          ls -la bin/
          if [ -f bin/mortgagecalc-0.2-debug.apk ]; then
            mv bin/mortgagecalc-0.2-debug.apk bin/app-32bit-debug.apk
          fi
          echo "=== 32-bit build completed ==="

      - name: Clean before 64-bit build
        run: |
          rm -rf .buildozer/android/platform/build-*/build
          rm -rf .buildozer/android/platform/build-*/.gradle

      - name: Build 64-bit APK
        run: |
          echo "=== Starting 64-bit build ==="
          buildozer -v android debug --spec buildozer_64.spec || { 
            echo "=== Build failed, showing logs ==="; 
            tail -n 200 .buildozer/android/platform/build-*/build/outputs/apk/debug/*.log 2>/dev/null || true;
            exit 1; 
          }
          ls -la bin/
          if [ -f bin/mortgagecalc-0.2-debug.apk ]; then
            mv bin/mortgagecalc-0.2-debug.apk bin/app-64bit-debug.apk
          fi
          echo "=== 64-bit build completed ==="

      - name: List APK files
        if: always()
        run: |
          echo "=== APK files in bin directory ==="
          ls -lh bin/*.apk 2>/dev/null || echo "No APK files found"

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: multi-arch-apks
          path: bin/*.apk
          retention-days: 30