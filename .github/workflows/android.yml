name: Build 32-bit and 64-bit APK
on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            build-essential cython3 \
            libpq-dev

      - name: Install Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          # Копируем pip конфиг для повышения надежности сети
          mkdir -p ~/.config/pip
          cp pip.conf ~/.config/pip/pip.conf || true
          pip install Cython==0.29.33 buildozer

      - name: Verify project files
        run: |
          test -f main.py && echo "✓ main.py found" || (echo "✗ main.py missing" && exit 1)
          python3 -m py_compile main.py && echo "✓ Python syntax OK"

      - name: Build 32-bit APK
        env:
          PYTHONUNBUFFERED: 1
        run: |
          cp buildozer_32.spec buildozer.spec
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "========================================="
            echo "Попытка сборки 32-bit: $attempt/$max_attempts"
            echo "========================================="
            
            if yes | buildozer -v android debug 2>&1 | tee build_32bit.log; then
              echo "✓ Сборка 32-bit успешна!"
              break
            else
              echo "✗ Попытка $attempt не удалась"
              if [ $attempt -lt $max_attempts ]; then
                echo "Ожидание 60 секунд перед повтором..."
                sleep 60
              fi
            fi
            attempt=$((attempt + 1))
          done
          
          if [ $attempt -gt $max_attempts ]; then
            echo "✗ Сборка 32-bit не удалась после $max_attempts попыток"
            tail -n 100 build_32bit.log
            exit 1
          fi
          
          # Проверяем наличие APK
          if [ -f bin/mortgagecalc-0.2-debug.apk ]; then
            cp bin/mortgagecalc-0.2-debug.apk bin/app-32bit-debug.apk
            echo "✓ 32-bit APK скопирован: bin/app-32bit-debug.apk"
          else
            echo "⚠ Ищем APK в build директориях..."
            find .buildozer -name "*.apk" -type f 2>/dev/null | head -1 | xargs -I {} cp {} bin/app-32bit-debug.apk || true
          fi
          ls -lah bin/ || true

      - name: Clean for next build
        run: |
          echo "Очистка кэша для следующей архитектуры..."
          rm -rf .buildozer/android/platform/build-*/build
          rm -rf .buildozer/android/platform/build-*/.gradle
          rm -rf .buildozer/android/platform/build-*/src

      - name: Build 64-bit APK
        env:
          PYTHONUNBUFFERED: 1
        run: |
          cp buildozer_64.spec buildozer.spec
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "========================================="
            echo "Попытка сборки 64-bit: $attempt/$max_attempts"
            echo "========================================="
            
            if yes | buildozer -v android debug 2>&1 | tee build_64bit.log; then
              echo "✓ Сборка 64-bit успешна!"
              break
            else
              echo "✗ Попытка $attempt не удалась"
              if [ $attempt -lt $max_attempts ]; then
                echo "Ожидание 60 секунд перед повтором..."
                sleep 60
              fi
            fi
            attempt=$((attempt + 1))
          done
          
          if [ $attempt -gt $max_attempts ]; then
            echo "✗ Сборка 64-bit не удалась после $max_attempts попыток"
            tail -n 100 build_64bit.log
            exit 1
          fi
          
          # Проверяем наличие APK
          if [ -f bin/mortgagecalc-0.2-debug.apk ]; then
            cp bin/mortgagecalc-0.2-debug.apk bin/app-64bit-debug.apk
            echo "✓ 64-bit APK скопирован: bin/app-64bit-debug.apk"
          else
            echo "⚠ Ищем APK в build директориях..."
            find .buildozer -name "*.apk" -type f 2>/dev/null | tail -1 | xargs -I {} cp {} bin/app-64bit-debug.apk || true
          fi
          ls -lah bin/ || true

      - name: Verify APK files
        run: |
          echo "=== Проверка APK файлов ==="
          ls -lh bin/*.apk 2>/dev/null || echo "Внимание: APK файлы не найдены"
          file bin/*.apk 2>/dev/null || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: APK-files
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: "Release ${{ steps.date.outputs.date }}"
          body: |
            🤖 Автоматическая сборка

            📱 **32-bit** — для старых телефонов (armeabi-v7a)
            📱 **64-bit** — для новых телефонов (arm64-v8a)

            Commit: ${{ github.sha }}
          files: bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}