name: Build 32-bit and 64-bit APK
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    # Обязательно используем ubuntu-20.04 или ubuntu-22.04
    # На ubuntu-latest (24.04) убрали distutils из Python, что ломает сборку
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            build-essential cython3 \
            libpq-dev \
            lld

      - name: Install Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33 buildozer virtualenv

      # --- 32-bit (armeabi-v7a) ---
      - name: Prepare 32-bit Spec
        run: |
          cp buildozer_32.spec buildozer.spec
          rm -rf bin/ || true
          mkdir -p final_apks

      - name: Build 32-bit APK
        # Используем set -eo pipefail чтобы ошибка buildozer сразу прерывала сборку
        run: |
          set -eo pipefail
          yes | buildozer -v android debug 2>&1 | tee build_32bit.log

      - name: Retrieve 32-bit APK
        run: |
          mv bin/*.apk final_apks/app-32bit-debug.apk || echo "Warning: No 32-bit APK found"

      # --- Очистка кеша платформы ---
      - name: Clean platform cache
        run: |
          echo "Очистка кэша архитектуры для избежания конфликтов..."
          rm -rf .buildozer/android/platform/build*/build || true
          rm -rf .buildozer/android/platform/build*/.gradle || true
          rm -rf .buildozer/android/platform/build*/src || true

      # --- 64-bit (arm64-v8a) ---
      - name: Prepare 64-bit Spec
        run: |
          cp buildozer_64.spec buildozer.spec
          rm -rf bin/ || true

      - name: Build 64-bit APK
        run: |
          set -eo pipefail
          yes | buildozer -v android debug 2>&1 | tee build_64bit.log

      - name: Retrieve 64-bit APK
        run: |
          mv bin/*.apk final_apks/app-64bit-debug.apk || echo "Warning: No 64-bit APK found"

      # --- Сохраняем Результаты ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: APK-files
          path: final_apks/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: "Release ${{ steps.date.outputs.date }}"
          body: |
            🤖 Автоматическая сборка

            📱 **32-bit** — для старых телефонов (armeabi-v7a)
            📱 **64-bit** — для новых телефонов (arm64-v8a)

            Commit: ${{ github.sha }}
          files: final_apks/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}