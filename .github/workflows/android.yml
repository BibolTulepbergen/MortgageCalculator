name: Build 32-bit and 64-bit APK
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 32-bit (armeabi-v7a) ---
      - name: Prepare 32-bit Spec
        run: |
          cp buildozer_32.spec buildozer.spec
          rm -rf bin/ || true
          mkdir -p final_apks

      - name: Build 32-bit APK
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer_32
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: Retrieve 32-bit APK
        run: |
          # The newly built 32-bit APK should be in bin/ directory
          mv bin/*.apk final_apks/app-32bit-debug.apk || echo "Warning: No 32-bit APK found"

      # --- Очистка кеша платформы для смены архитектуры ---
      - name: Clean platform cache
        run: |
          echo "Очистка кэша архитектуры для избежания конфликтов..."
          rm -rf .buildozer/android/platform/build*/build || true
          rm -rf .buildozer/android/platform/build*/.gradle || true
          rm -rf .buildozer/android/platform/build*/src || true

      # --- 64-bit (arm64-v8a) ---
      - name: Prepare 64-bit Spec
        run: |
          cp buildozer_64.spec buildozer.spec
          rm -rf bin/ || true

      - name: Build 64-bit APK
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer_64
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: Retrieve 64-bit APK
        run: |
          # The newly built 64-bit APK should be in bin/ directory
          mv bin/*.apk final_apks/app-64bit-debug.apk || echo "Warning: No 64-bit APK found"

      # --- Сохраняем Результаты ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: APK-files
          path: final_apks/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: "Release ${{ steps.date.outputs.date }}"
          body: |
            🤖 Автоматическая сборка

            📱 **32-bit** — для старых телефонов (armeabi-v7a)
            📱 **64-bit** — для новых телефонов (arm64-v8a)

            Commit: ${{ github.sha }}
          files: final_apks/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}