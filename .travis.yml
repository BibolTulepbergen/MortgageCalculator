os: linux
dist: focal
language: python
python:
  - "3.8"

install:
  - sudo apt update
  - sudo apt install -y git zip unzip openjdk-8-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
  - pip install --upgrade pip
  - pip install --upgrade Cython==0.29.33 virtualenv
  - pip install buildozer
  - export PATH=$PATH:~/.local/bin/

script:
  - yes | buildozer android debug

before_deploy:
  - echo "Подготовка к деплою..."
  - ls bin/

deploy:
  provider: releases
  api_key: $GITHUB_TOKEN
  file_glob: true
  file: "bin/*.apk"
  skip_cleanup: true
  on:
    branch: main
    tags: false

cache:
  pip: true
  directories:
    - $HOME/.buildozer
    - $HOME/.gradle
